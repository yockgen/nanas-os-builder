image:
  name: emt3-default-x86_64
  version: "1.0.0"

target:
  os: edge-microvisor-toolkit # Target OS name
  dist: emt3 # Target OS distribution
  arch: x86_64 # Target OS architecture
  imageType: raw # Image type, valid value: [raw, iso].

disk:
  name: Default_Raw # 1:1 mapping to the systemConfigs name
  artifacts:
    -
      type: raw  # image file format
      compression: gz # image compression format (optional)
  size: 4GiB # 4G, 4GB, 4096 MiB also valid. (Required for raw)
  partitionTableType: gpt # Partition table type, valid value: [gpt, mbr]
  partitions: # Required for raw, optional for ISO, not needed for rootfs.
    - id: boot
      type: esp
      flags:
        - esp
        - boot
      start: 1MiB
      end: 513MiB
      fsType: fat32
      mountPoint: /boot/efi
      mountOptions: umask=0077

    - id: rootfs
      type: linux-root-amd64
      start: 513MiB
      end: 2561MiB
      fsType: ext4
      mountPoint: /
      mountOptions: defaults

    - id: roothashmap
      type: linux
      start: 2561MiB
      end: 3061MiB
      fsType: ext4
      mountPoint: none

    - id: userdata
      type: linux
      start: 3061MiB
      end: "0"  # use the rest of the disk space
      fsType: ext4
      mountPoint: /opt

systemConfig:
  name: Default_Raw
  description: Default yml configuration for raw image

  bootloader:
    bootType: efi # (efi or legacy)
    provider: systemd-boot # (grub for efi and legacy mode, or systemd-boot for efi mode)

  immutability:
    enabled: true # default is true

  packages:
    # base packages
    - systemd-boot
    - systemd-ukify
    - ca-certificates
    - cronie-anacron
    - logrotate
    - core-packages-base-image
    - initramfs
    - shadow-utils
    - coreutils
    - openssh-server
    - systemd-resolved
    - veritysetup
    - efibootmgr

  additionalFiles:
    - local: ../additionalfiles/99-dhcp-en.network
      final: /etc/systemd/network/99-dhcp-en.network
    - local: ../additionalfiles/systemd-networkd-wait-online-override.conf
      final: /etc/systemd/system/systemd-networkd-wait-online.service.d/override.conf
    - local: ../additionalfiles/emt-cloud-init.cfg
      final: /etc/cloud/cloud.cfg

  kernel:
    name: kernel
    cmdline: "console=ttyS0,115200 console=tty0 loglevel=7"
    uki: true
    packages:
      - kernel-drivers-gpu

  configurations:
    # Set up ssh directories with correct permissions
    - cmd: "mkdir -m 755 -p /opt/var/lib/sshd"
    - cmd: "printf 'd /run/sshd 0755 root root -\\n' > /etc/tmpfiles.d/sshd.conf"
